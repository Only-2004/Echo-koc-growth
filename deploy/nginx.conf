# Beacon · Nginx 主配置（生产 · 外层反代）
#
# 拓扑：
#   公网 → Nginx :80/:443  ──┬─→  /api/*  → backend:8000   (FastAPI)
#                            └─→  /        → frontend:80    (内置 nginx serve dist)
#
# 启动方式（容器内）：
#   nginx -g "daemon off;"   ← nginx:alpine 默认 CMD
#
# 此文件被挂载到 nginx 容器的 /etc/nginx/nginx.conf（只读）。
# 修改后需要 docker compose exec nginx nginx -s reload 才生效。
#
# ----------------------------------------------------------------------------
# 域名约定
# ----------------------------------------------------------------------------
# 默认配置 server_name = _（接受任何 Host header），
# 生产推荐用 nip.io 通配域名（无需注册即可指向公网 IP），
# 例：43-134-72-220.nip.io 自动解析到 43.134.72.220。
# Let's Encrypt 证书目录命名固定为 /etc/letsencrypt/live/beacon/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- 日志 ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ---- 通用调优 ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10M;   # 上传/POST body 上限（演示用 10MB 足够）

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ---- 上游：后端 FastAPI（docker network 内部 DNS）----
    upstream beacon_backend {
        server backend:8000;
        keepalive 32;
    }

    # ---- 上游：前端容器（内置 nginx serve dist）----
    upstream beacon_frontend {
        server frontend:80;
        keepalive 16;
    }

    # ========================================================================
    # 80 端口：HTTP 入口
    # 1. 把 Let's Encrypt webroot 验证路径 /.well-known/acme-challenge/ 放过
    # 2. 其余流量 301 → HTTPS
    # ========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # certbot webroot 验证（init-letsencrypt.sh 与 续期 cron 都用这条）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其余请求强制升级 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # 443 端口：HTTPS 主站
    # ========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ---- SSL 证书（由 init-letsencrypt.sh 申请，挂载到 /etc/letsencrypt）----
        # 证书目录命名：/etc/letsencrypt/live/beacon/（init-letsencrypt.sh 会创建）
        ssl_certificate     /etc/letsencrypt/live/beacon/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/beacon/privkey.pem;

        # ---- SSL 安全策略 ----
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---- 安全头 ----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- API 反代到后端 FastAPI ----
        location /api/ {
            proxy_pass http://beacon_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE 流式响应支持（onboarding / strategy / retro 都用 SSE）
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- 健康检查端点（nginx 自身，绕过后端）----
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ---- 其余流量 → 前端容器（内置 nginx serve dist + SPA fallback）----
        location / {
            proxy_pass http://beacon_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
