# Beacon · Debug Nginx 配置（HTTP-only，端口 8090）
#
# 用途：与生产 80/443 隔离，在 worktree 内独立调试。
# 拓扑：公网 :8090 → nginx:80（容器内）→ /api/* → backend:8000；/* → frontend:80
#
# 与 deploy/nginx.conf 的区别：
#   - 不开 443、不读 Let's Encrypt 证书（自签 / 公网 IP 直连场景够用）
#   - 不重定向到 HTTPS

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    upstream beacon_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream beacon_frontend {
        server frontend:80;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # /api/* → 后端（FastAPI）
        # SSE 流式响应：关 buffering、保持长连接
        location /api/ {
            proxy_pass http://beacon_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # /* → 前端容器（内置 nginx serve dist）
        location / {
            proxy_pass http://beacon_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
