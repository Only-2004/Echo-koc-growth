# Beacon · 生产 docker-compose override
#
# 用法：
#   cd /opt/beacon
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# 这是 override 文件，会与根目录 docker-compose.yml 合并。
#
# 架构：
#
#   公网 :80/:443
#         │
#         ▼
#   ┌──────────────┐
#   │  nginx 容器  │  ← HTTPS 终结、SSL 证书、HTTP→HTTPS 重定向
#   │  (alpine)    │
#   └──────┬───────┘
#          │ docker network 内部
#          ├─→ /api/*  → backend:8000  (FastAPI · uvicorn)
#          └─→ /*      → frontend:80   (内置 nginx serve dist)
#
# 关键改动相对 base docker-compose.yml：
#   1. backend：用 BUILD_ENV=prod（不装 dev 依赖）+ 不暴露 8000 到公网
#   2. frontend：换 Dockerfile.prod（多阶段 build → 内置 nginx serve dist）
#   3. 新增 nginx 服务：外层反代 + HTTPS（80/443）
#   4. 新增 certbot 服务（profile=certbot，按需运行）：续期证书
#   5. 所有服务 restart: unless-stopped + JSON 日志轮转（10MB × 5）
#   6. runtime_data / cache 持久化卷
#   7. backend 加 mem_limit: 1g 防 OOM 拖垮全机

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_ENV: prod
    restart: unless-stopped
    mem_limit: 1g
    # 不映射端口到公网，仅在 docker network 内暴露 8000 给 nginx
    ports: !reset []
    expose:
      - "8000"
    volumes:
      # 数据目录在项目根（runtime_data/, cache/）；容器内 project_root=/app
      - ./runtime_data:/app/runtime_data
      - ./cache:/app/cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    mem_limit: 256m
    ports: !reset []
    expose:
      - "80"
    # 容器内置 nginx serve dist；外层 nginx 通过 proxy_pass 转发
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: beacon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 主配置（只读）
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt 证书（init-letsencrypt.sh 申请）
      - ./deploy/letsencrypt:/etc/letsencrypt:ro
      # certbot webroot 验证目录
      - ./deploy/certbot-www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # 证书续期服务（默认不启动；按需运行）
  # 一次性续期：
  #   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml \
  #     --profile certbot run --rm certbot renew
  # 续期后 reload nginx：
  #   docker compose exec nginx nginx -s reload
  certbot:
    image: certbot/certbot:latest
    container_name: beacon-certbot
    volumes:
      - ./deploy/letsencrypt:/etc/letsencrypt
      - ./deploy/certbot-www:/var/www/certbot
    profiles: ["certbot"]
