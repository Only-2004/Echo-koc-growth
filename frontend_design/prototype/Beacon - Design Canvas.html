<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<title>Beacon · 设计画布（3 个布局对比）</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css?v=light"/>
<style>
  html, body, #root { height: 100%; }
  body { overflow: hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="components/chat-dock.jsx"></script>
<script type="text/babel" src="components/variations.jsx"></script>
<script type="text/babel">
const { useState } = React;

const NoteHeader = ({ kicker, title, body }) => (
  <div style={{ padding: "0 8px 18px", maxWidth: 720 }}>
    <div className="h-mono" style={{ marginBottom: 6 }}>{kicker}</div>
    <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: "-0.01em", color: "var(--fg-0)", marginBottom: 8 }}>{title}</div>
    <div style={{ fontSize: 13, color: "var(--fg-2)", lineHeight: 1.65 }}>{body}</div>
  </div>
);

const VarA = () => (
  <div style={{
    width: "100%", height: "100%",
    background: "var(--bg-0)",
    display: "grid", placeItems: "center", padding: 24,
  }}>
    <div style={{
      width: "100%", height: "100%",
      borderRadius: 14, overflow: "hidden",
      background: "var(--bg-0)",
      border: "1px solid var(--line-1)",
      position: "relative",
    }}>
      <iframe src="Beacon - KOC Agent Prototype.html" style={{
        width: "100%", height: "100%", border: "none",
      }}/>
    </div>
  </div>
);

const Root = () => (
  <DesignCanvas
    title="Beacon · KOC 成长伙伴"
    subtitle="3 个布局方向 · 同样的数据与 agent 行为"
  >
    <DCSection id="full" title="完整原型 · A · 三栏布局（推荐）">
      <DCArtboard id="full-app" label="左导航 + 主区 + 右侧持续对话（默认）" width={1440} height={900}>
        <VarA/>
      </DCArtboard>
    </DCSection>

    <DCSection id="b" title="变体 B · 对话优先">
      <DCArtboard id="conv-first" label="结构化卡片嵌在对话里 · 适合「刚起步」用户" width={900} height={900}>
        <VarBChat/>
      </DCArtboard>
    </DCSection>

    <DCSection id="c" title="变体 C · 数据优先">
      <DCArtboard id="ops" label="高密度仪表盘 · 适合已经稳定的 KOC（pro 模式）" width={1280} height={900}>
        <VarCDashboard/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
